server {
    if ($host = www.thuthachai.io.vn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = thuthachai.io.vn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name thuthachai.io.vn www.thuthachai.io.vn;
    return 404; # managed by Certbot




}
